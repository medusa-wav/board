<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sunn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      user-select: none;
    }

    :root {
      --bg:      #0a0804;
      --surface: #110e08;
      --border:  #1e1810;
      --dim:     #2e2518;
      --muted:   #564838;
      --soft:    #8a7055;
      --bright:  #c8aa80;
      --white:   #e8d5b0;
      --accent:  #c87820;
      --accent2: #e8a050;
      --accent3: #8a5010;
    }

    html, body { height: 100%; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--bright);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 5rem 1.5rem 6rem;
      padding-top: calc(88px + 4rem);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.35;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
      pointer-events: none; z-index: 9998;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none; z-index: 0;
      filter: blur(80px);
    }

    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(180,100,20,0.08) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -55%);
      animation: orb1 11s ease-in-out infinite;
    }

    .orb-2 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(120,60,10,0.06) 0%, transparent 70%);
      bottom: 10%; right: 15%;
      animation: orb2 14s ease-in-out infinite;
    }

    @keyframes orb1 {
      0%,100% { transform: translate(-50%,-55%) scale(1); }
      50%      { transform: translate(-46%,-58%) scale(1.1); }
    }
    @keyframes orb2 {
      0%,100% { transform: scale(1) translate(0,0); }
      50%      { transform: scale(1.15) translate(-20px, -30px); }
    }

    /* ── EP BANNER ── */
    .ep-banner {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 10000; min-height: 88px;
      display: flex; align-items: stretch;
      text-decoration: none;
      background: #0e0b06;
      border-bottom: 1px solid var(--border);
      overflow: hidden; transition: background 0.25s;
    }

    .ep-banner::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(100deg, rgba(200,120,32,0.09) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    .ep-banner:hover { background: #13100a; }
    .ep-banner:hover .ep-arrow { transform: translate(2px,-2px); color: var(--accent); }
    .ep-banner:hover .ep-listen { color: var(--bright); }

    .ep-cover {
      width: 88px; min-width: 88px; height: 88px;
      object-fit: cover; flex-shrink: 0;
      filter: brightness(0.88) saturate(1.15);
      position: relative; z-index: 1;
    }

    .ep-body {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; gap: 5px; padding: 14px 16px;
      position: relative; z-index: 1;
    }

    .ep-top { display: flex; align-items: center; gap: 8px; }

    .ep-pill {
      font-size: 0.42rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--accent); border: 1px solid var(--accent3);
      border-radius: 2px; padding: 2px 6px; flex-shrink: 0;
    }

    .ep-eyebrow {
      font-size: 0.38rem; letter-spacing: 0.28em;
      color: var(--dim); text-transform: uppercase; line-height: 1;
    }

    .ep-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1.35rem; letter-spacing: -0.04em;
      color: var(--white); line-height: 1;
    }

    .ep-title .dot {
      color: var(--accent);
      animation: blink 4.5s ease-in-out infinite;
    }

    .ep-sub {
      font-size: 0.38rem; letter-spacing: 0.18em;
      color: var(--dim); text-transform: uppercase; font-style: italic;
    }

    .ep-cta {
      display: flex; align-items: center;
      padding: 0 20px; gap: 8px; flex-shrink: 0;
      position: relative; z-index: 1;
    }

    .ep-listen {
      font-size: 0.4rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted); font-style: italic;
      transition: color 0.2s; white-space: nowrap;
    }

    .ep-arrow {
      font-size: 0.85rem; color: var(--dim);
      transition: transform 0.22s cubic-bezier(0.2,1,0.4,1), color 0.2s;
    }

    /* ── PAGE ── */
    .page {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      display: flex; flex-direction: column; align-items: center;
    }

    /* ── HEADER ── */
    .header {
      width: 100%; text-align: center;
      margin-bottom: 4rem;
      opacity: 0;
      animation: rise 0.9s 0.05s cubic-bezier(0.2,1,0.4,1) forwards;
    }

    .wm-wrap {
      position: relative;
      display: inline-block;
    }

    .wm-ghost {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: clamp(5.5rem, 24vw, 8.5rem);
      line-height: 0.9; letter-spacing: -0.07em;
      color: transparent;
      -webkit-text-stroke: 1px rgba(180,100,20,0.08);
      white-space: nowrap;
      pointer-events: none; user-select: none;
      filter: blur(2px);
    }

    .wordmark {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: clamp(5.5rem, 24vw, 8.5rem);
      line-height: 0.9; letter-spacing: -0.07em;
      color: var(--white);
      position: relative; z-index: 1;
      text-shadow:
        0 0 80px rgba(180,100,20,0.14),
        0 2px 0 rgba(0,0,0,0.7);
    }

    .wordmark .dot {
      color: var(--accent);
      display: inline-block;
      animation: blink 4.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%,72%,100% { opacity: 1; }
      82%          { opacity: 0.1; }
    }

    .tagline {
      margin-top: 1.1rem;
      font-size: 0.53rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      font-style: italic;
      opacity: 0;
      animation: rise 0.7s 0.28s cubic-bezier(0.2,1,0.4,1) forwards;
    }

    .live-row {
      display: inline-flex; align-items: center;
      gap: 0.5rem; margin-top: 0.7rem;
      font-size: 0.44rem; letter-spacing: 0.26em;
      color: var(--muted); text-transform: uppercase;
      opacity: 0;
      animation: rise 0.6s 0.42s forwards;
    }

    .dot-live {
      width: 5px; height: 5px;
      background: var(--accent); border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(200,120,32,0.8); }
      50%      { box-shadow: 0 0 0 6px rgba(200,120,32,0); }
    }

    /* ── SEPARATOR ── */
    .sep {
      width: 100%; display: flex;
      align-items: center; gap: 1rem;
      margin-bottom: 0;
      opacity: 0; animation: rise 0.55s forwards;
    }

    .sep-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
    }

    .sep-label {
      font-size: 0.43rem;
      letter-spacing: 0.36em;
      color: var(--dim);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* ── LINKS SECTION ── */
    .section {
      width: 100%;
      display: flex; flex-direction: column;
      gap: 0;
      margin-bottom: 0;
    }

    .section + .section {
      margin-top: 2.4rem;
    }

    /* ── LINK ITEM ── */
    .link-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 0.5rem 1rem 0.75rem;
      text-decoration: none; color: var(--bright);
      position: relative;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
      opacity: 0; animation: rise 0.5s forwards;
      overflow: hidden;
    }

    .link-item:first-child {
      border-top: 1px solid var(--border);
    }

    .link-item::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(180,100,20,0.06) 0%, transparent 80%);
      opacity: 0; transition: opacity 0.25s;
      pointer-events: none;
    }

    .link-item:hover::after { opacity: 1; }

    .link-item::before {
      content: '';
      position: absolute; left: 0;
      top: 30%; bottom: 30%;
      width: 1.5px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s, top 0.25s cubic-bezier(0.2,1,0.4,1), bottom 0.25s cubic-bezier(0.2,1,0.4,1);
    }

    .link-item:hover::before { opacity: 1; top: 10%; bottom: 10%; }
    .link-item:hover .link-label  { color: var(--white); }
    .link-item:hover .link-plat   { color: var(--accent2); }
    .link-item:hover .link-arrow  { transform: translate(3px,-3px); color: var(--accent); }
    .link-item:hover .link-icon svg { fill: var(--accent2); }

    .link-icon {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 13px; height: 13px;
      fill: var(--muted); transition: fill 0.2s, stroke 0.2s;
    }

    .link-icon svg[stroke] { fill: none; stroke: var(--muted); }
    .link-item:hover .link-icon svg[stroke] { stroke: var(--accent2); }

    .link-body { flex: 1; display: flex; flex-direction: column; gap: 0.1rem; }

    .link-plat {
      font-size: 0.42rem; letter-spacing: 0.28em;
      color: var(--muted); text-transform: uppercase;
      transition: color 0.2s;
    }

    .link-label {
      font-size: 0.68rem; font-weight: 300;
      color: var(--soft); letter-spacing: 0.01em;
      transition: color 0.2s;
    }

    .link-arrow {
      font-size: 0.7rem; color: var(--dim);
      transition: transform 0.22s cubic-bezier(0.2,1,0.4,1), color 0.2s;
      flex-shrink: 0;
    }

    /* ── EMAIL ── */
    .email-block {
      margin-top: 3rem;
      width: 100%; text-align: center;
      opacity: 0;
      animation: rise 0.5s 1.25s forwards;
    }

    .email-lbl {
      font-size: 0.42rem; letter-spacing: 0.32em;
      color: var(--dim); text-transform: uppercase;
      margin-bottom: 0.55rem;
    }

    .email-a {
      font-size: 0.66rem;
      font-style: italic; font-weight: 300;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .email-a:hover { color: var(--accent2); border-color: var(--accent3); }

    /* ── FOOTER ── */
    .footer {
      margin-top: 4rem;
      text-align: center;
      opacity: 0;
      animation: rise 0.5s 1.4s forwards;
    }

    .footer-mark {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 0.9rem; color: var(--dim);
      letter-spacing: -0.03em;
    }

    .footer-mark span { color: var(--accent); opacity: 0.45; }

    .footer-copy {
      font-size: 0.4rem; letter-spacing: 0.22em;
      color: var(--dim); text-transform: uppercase;
      margin-top: 0.35rem;
      font-style: italic;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .sec-songs .sep         { animation-delay: 0.50s; }
    .sec-songs .link-item:nth-child(1) { animation-delay: 0.58s; }
    .sec-songs .link-item:nth-child(2) { animation-delay: 0.66s; }
    .sec-songs .link-item:nth-child(3) { animation-delay: 0.74s; }

    .sec-social .sep         { animation-delay: 0.90s; }
    .sec-social .link-item:nth-child(1) { animation-delay: 0.98s; }
    .sec-social .link-item:nth-child(2) { animation-delay: 1.06s; }

    @media (max-width: 500px) {
      body { padding: 3.5rem 1.2rem 5rem; padding-top: calc(88px + 2.5rem); }
      .ep-cta { padding: 0 12px; }
      .ep-listen { display: none; }
    }
  </style>
</head>
