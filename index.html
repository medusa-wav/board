<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>terminal://board</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --h: 135;
      --green:        hsl(var(--h), 100%, 50%);
      --green-dim:    hsl(var(--h), 100%, 39%);
      --green-bright: hsl(var(--h), 100%, 68%);
      --green-faint:  hsla(var(--h), 100%, 50%, 0.07);
      --green-glow:   hsla(var(--h), 100%, 50%, 0.18);
      --green-border: hsla(var(--h), 100%, 50%, 0.2);
      --bg:  #0a0a0a;
      --bg2: #0d0d0d;
      --bg3: #101013;
      --text:  hsl(var(--h), 100%, 88%);
      --muted: hsl(var(--h), 24%, 39%);
      --warn:  #ffcc00;
      --error: #ff4444;
    }


    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      user-select: none;
    }

    /* SCANLINES */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.13) 2px, rgba(0,0,0,.13) 4px);
      pointer-events: none;
      z-index: 9997;
    }

    /* VIGNETTE */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.65) 100%);
      pointer-events: none;
      z-index: 9996;
    }

    /* BOOT */
    #boot {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
      transition: opacity .5s ease;
    }

    #boot-log {
      width: min(520px, 90vw);
      font-size: 12px;
      line-height: 2;
      color: var(--muted);
      max-height: 320px;
      overflow: hidden;
    }

    #boot-log .bl {
      display: block;
      opacity: 0;
      animation: bline .1s ease forwards;
      white-space: nowrap;
      overflow: hidden;
    }
    @keyframes bline { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }

    .bl-ok    { color: var(--green); }
    .bl-warn  { color: var(--warn); }
    .bl-title {
      color: var(--green);
      font-size: 18px;
      font-weight: 700;
      text-shadow: 0 0 20px var(--green);
      margin-bottom: 4px;
      letter-spacing: .08em;
    }

    #boot-bar-wrap {
      width: min(520px, 90vw);
      margin-top: 14px;
      height: 3px;
      background: var(--bg3);
      border: 1px solid var(--green-border);
      border-radius: 1px;
      overflow: hidden;
      opacity: 0;
      transition: opacity .3s;
    }
    #boot-bar {
      height: 100%;
      width: 0%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
      transition: width .05s linear;
    }

    /* HEADER */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: 46px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--green-border);
      background: rgba(7,7,9,.92);
      backdrop-filter: blur(8px);
      z-index: 200;
      opacity: 0; transform: translateY(-8px);
      transition: opacity .45s ease, transform .45s ease;
    }
    #header.on { opacity: 1; transform: translateY(0); }

    #header-left { display: flex; align-items: center; gap: 12px; }

    .sdot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 8px var(--green);
      animation: pulse 2.4s infinite; flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    #logo {
      color: var(--green); font-size: 14px; font-weight: 700;
      letter-spacing: .06em; text-shadow: 0 0 14px var(--green);
    }
    #bc { color: var(--muted); font-size: 10px; letter-spacing: .04em; }

    #header-right { display: flex; align-items: center; gap: 12px; font-size: 11px; }
    #note-count   { color: var(--green-dim); letter-spacing: .03em; }
    #clock        { color: var(--muted); font-size: 11px; letter-spacing: .04em; min-width: 56px; text-align: right; }

    .hbtn {
      background: var(--green-faint);
      border: 1px solid var(--green-border);
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 700;
      padding: 5px 13px; cursor: pointer; border-radius: 2px;
      transition: background .15s, border-color .15s, box-shadow .15s;
      letter-spacing: .06em;
    }
    .hbtn:hover {
      border-color: var(--green);
      background: var(--green-glow);
      box-shadow: 0 0 14px var(--green-glow);
    }
    .hbtn.danger {
      background: transparent;
      border-color: rgba(255,68,85,.25);
      color: rgba(255,68,85,.5);
    }
    .hbtn.danger:hover { border-color: var(--error); color: var(--error); box-shadow: 0 0 12px rgba(255,68,85,.2); }
    .hbtn.sm { padding: 5px 9px; font-size: 13px; }

    /* THEME PANEL */
    #tp {
      position: fixed; top: 54px; right: 14px;
      background: var(--bg2); border: 1px solid var(--green-border);
      padding: 12px; z-index: 400; width: 200px;
      box-shadow: 0 8px 32px rgba(0,0,0,.8), 0 0 16px var(--green-glow);
      border-radius: 3px;
      transition: opacity .15s, transform .15s;
    }
    #tp.off { opacity:0; pointer-events:none; transform:translateY(-6px) scale(.97); }
    #tp-title { color: var(--muted); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
    #hue-row  { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .hdot     { width: 22px; height: 22px; border-radius: 2px; cursor: pointer; border: 1px solid rgba(255,255,255,.1); transition: transform .1s; }
    .hdot:hover { transform: scale(1.2); }
    .hdot.on  { border: 2px solid #fff; }
    #hue-sl {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 8px; border-radius: 2px; outline: none; cursor: pointer;
      background: linear-gradient(to right,hsl(0,100%,50%),hsl(30,100%,50%),hsl(60,100%,50%),hsl(90,100%,50%),hsl(120,100%,50%),hsl(150,100%,50%),hsl(180,100%,50%),hsl(210,100%,50%),hsl(240,100%,50%),hsl(270,100%,50%),hsl(300,100%,50%),hsl(330,100%,50%),hsl(360,100%,50%));
      border: 1px solid rgba(255,255,255,.1); margin-bottom: 8px;
    }
    #hue-sl::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 2px;
      background: #fff; border: 2px solid rgba(0,0,0,.5); cursor: pointer; box-shadow: 0 0 4px rgba(0,0,0,.5);
    }
    #hue-val { color: var(--muted); font-size: 10px; text-align: center; letter-spacing: .05em; }

    /* BOARD */
    #board { position: fixed; top: 46px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: default;
      background-image: radial-gradient(circle, hsla(var(--h),100%,50%,.14) 1px, transparent 1px);
      background-size: 32px 32px; background-position: 16px 16px;
    }
    #bi { position: absolute; inset: 0; }
    

    /* NOTE */
    .note {
      position: absolute;
      width: 228px;
      background: color-mix(in srgb, var(--accent, var(--green)) 5%, var(--bg2));
      border: 1px solid color-mix(in srgb, var(--accent, var(--green)) 30%, transparent);
      border-radius: 3px;
      display: flex; flex-direction: column;
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
      transition: box-shadow .2s, border-color .2s;
    }
    .note::after {
      content: ''; position: absolute; inset: 0; border-radius: 3px;
      box-shadow: 0 0 0 0 transparent; transition: box-shadow .2s; pointer-events: none;
    }
    .note:hover {
      border-color: color-mix(in srgb, var(--accent, var(--green)) 60%, transparent);
      box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 20px color-mix(in srgb, var(--accent, var(--green)) 20%, transparent);
      z-index: 50 !important;
    }
    .note:hover::after { box-shadow: inset 0 0 24px hsla(var(--h),100%,50%,.04); }
    .note.dragging {
      border-color: var(--accent, var(--green)) !important;
      box-shadow: 0 16px 48px rgba(0,0,0,.8), 0 0 36px color-mix(in srgb, var(--accent,var(--green)) 40%, transparent);
      z-index: 1000 !important;
      transition: box-shadow .2s, border-color .2s !important;
    }

    /* accent bar */
    .n-bar {
      height: 2px;
      background: var(--accent, var(--green));
      box-shadow: 0 0 10px var(--accent, var(--green)), 0 0 24px color-mix(in srgb, var(--accent,var(--green)) 35%, transparent);
      border-radius: 3px 3px 0 0;
      flex-shrink: 0;
      transition: box-shadow .2s;
    }
    .note:hover .n-bar { box-shadow: 0 0 16px var(--accent, var(--green)), 0 0 36px color-mix(in srgb, var(--accent,var(--green)) 50%, transparent); }

    /* header */
    .n-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 10px 6px; cursor: grab; user-select: none; gap: 6px; position: relative;
    }
    .n-hdr::after {
      content: ''; position: absolute; bottom: 0; left: 10px; right: 10px;
      height: 1px; background: var(--green-border);
    }
    .n-hdr:active { cursor: grabbing; }

    .n-grip { display: flex; flex-direction: column; gap: 2.5px; padding: 2px 2px 2px 0; flex-shrink: 0; opacity: .2; transition: opacity .15s; }
    .n-grip span { display: flex; gap: 2.5px; }
    .n-grip span i { display: block; width: 2px; height: 2px; background: var(--muted); border-radius: 50%; }
    .note:hover .n-grip { opacity: .5; }

    .n-tag {
      color: var(--accent, var(--green)); font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      text-shadow: 0 0 8px color-mix(in srgb, var(--accent,var(--green)) 55%, transparent);
      flex: 1; outline: none; background: transparent; border: none;
      font-family: 'JetBrains Mono', monospace; cursor: text; min-width: 0;
      transition: text-shadow .15s;
    }
    .n-tag:focus { color: var(--text); text-shadow: none; text-transform: none; letter-spacing: .04em; }

    .n-acts { display: flex; gap: 2px; flex-shrink: 0; position: relative; }

    .ib {
      background: transparent; border: none; color: var(--muted);
      font-family: 'JetBrains Mono', monospace; font-size: 12px; cursor: pointer;
      padding: 3px 5px; border-radius: 2px; transition: color .12s, background .12s; line-height: 1;
    }
    .ib:hover { color: var(--text); background: var(--green-faint); }
    .ib.del:hover { color: var(--error); background: rgba(255,68,68,.08); }
    .ib.pinon { color: var(--warn) !important; }

    /* body */
    .n-body { flex: 1; padding: 10px 11px 6px; position: relative; min-height: 90px; }

    .n-ta {
      width: 100%; min-height: 80px; background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6;
      resize: none; caret-color: var(--accent, var(--green)); cursor: text;
    }
    .n-ta::placeholder { color: var(--muted); font-style: italic; }
    .n-ta.dn { display: none; }

    /* checklist */
    .n-cl { display: flex; flex-direction: column; gap: 5px; min-height: 80px; }
    .n-cl.dn { display: none; }

    .ci { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; line-height: 1.6; animation: cin .15s ease; }
    @keyframes cin { from{opacity:0;transform:translateX(-4px)} to{opacity:1;transform:translateX(0)} }

    .ccb {
      appearance: none; -webkit-appearance: none;
      width: 13px; height: 13px; border: 1px solid var(--muted); border-radius: 2px;
      flex-shrink: 0; margin-top: 2px; cursor: pointer; position: relative; background: transparent;
      transition: border-color .15s, background .15s, box-shadow .15s;
    }
    .ccb:checked {
      border-color: var(--accent, var(--green));
      background: color-mix(in srgb, var(--accent,var(--green)) 12%, transparent);
      box-shadow: 0 0 6px color-mix(in srgb, var(--accent,var(--green)) 40%, transparent);
    }
    .ccb:checked::after {
      content: '✓'; position: absolute; top: -2px; left: 1px;
      font-size: 11px; color: var(--accent, var(--green));
      font-family: 'JetBrains Mono', monospace; font-weight: 700;
    }

    .clbl {
      flex: 1; outline: none; background: transparent; border: none;
      color: var(--text); font-family: 'JetBrains Mono', monospace;
      font-size: 13px; line-height: 1.6; cursor: text; min-width: 0; word-break: break-word;
      transition: color .15s;
    }
    .clbl.dn { color: var(--muted); text-decoration: line-through; }

    .acb {
      margin-top: 7px; background: transparent; border: none; color: var(--muted);
      font-family: 'JetBrains Mono', monospace; font-size: 11px; cursor: pointer;
      padding: 2px 0; text-align: left; transition: color .12s;
    }
    .acb:hover { color: var(--accent, var(--green)); }
    .acb.dn { display: none; }

    .rcb {
      margin-top: 4px; background: transparent; border: none; color: var(--muted);
      font-family: 'JetBrains Mono', monospace; font-size: 11px; cursor: pointer;
      padding: 2px 0; text-align: left; transition: color .12s;
    }
    .rcb:hover { color: var(--error); }
    .rcb.dn { display: none; }

    /* footer */
    .n-ftr {
      padding: 5px 11px 8px; display: flex; align-items: center; justify-content: space-between; position: relative;
    }
    .n-ftr::before {
      content: ''; position: absolute; top: 0; left: 11px; right: 11px;
      height: 1px; background: var(--green-border);
    }

    .n-tog {
      background: transparent; border: 1px solid var(--green-border); color: var(--muted);
      font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 8px; cursor: pointer;
      border-radius: 2px; transition: all .15s; letter-spacing: .04em;
    }
    .n-tog:hover { border-color: var(--accent, var(--green)); color: var(--accent, var(--green)); }
    .n-tog.on { border-color: color-mix(in srgb, var(--accent,var(--green)) 50%, transparent); color: var(--green-dim); }

    .n-meta { color: var(--muted); font-size: 9px; letter-spacing: .04em; display: flex; gap: 6px; align-items: center; }
    .n-prog { color: color-mix(in srgb, var(--accent,var(--green)) 70%, var(--muted)); }

    /* resize handle */
    .n-rsz {
      position: absolute; bottom: 0; right: 0; width: 18px; height: 18px;
      cursor: se-resize; opacity: 0; transition: opacity .15s;
      display: flex; align-items: flex-end; justify-content: flex-end; padding: 3px;
    }
    .n-rsz::before {
      content: ''; display: block; width: 8px; height: 8px;
      border-right: 1.5px solid var(--muted); border-bottom: 1.5px solid var(--muted); border-radius: 0 0 2px 0;
    }
    .note:hover .n-rsz { opacity: .6; }
    .n-rsz:hover { opacity: 1 !important; }

    /* color picker */
    .cpick {
      position: absolute; top: 100%; right: 0; margin-top: 6px;
      background: var(--bg2); border: 1px solid var(--green-border); padding: 10px;
      z-index: 300; display: grid; grid-template-columns: repeat(5,1fr); gap: 5px;
      width: 140px; box-shadow: 0 8px 32px rgba(0,0,0,.8), 0 0 16px var(--green-glow);
      border-radius: 3px; animation: cpin .12s ease;
    }
    @keyframes cpin { from{opacity:0;transform:translateY(-4px) scale(.97)} to{opacity:1;transform:none} }
    .cdot {
      width: 20px; height: 20px; border-radius: 2px; cursor: pointer;
      border: 1px solid rgba(255,255,255,.08); transition: transform .1s, box-shadow .1s;
    }
    .cdot:hover { transform: scale(1.25); }
    .cdot.on { border: 2px solid #fff; box-shadow: 0 0 8px #fff4; }

    /* note animations */
    @keyframes noteIn {
      0%   { opacity:0; scale:.88; translate:0 10px; }
      60%  { scale:1.02; translate:0 -2px; }
      100% { opacity:1; scale:1; translate:0 0; }
    }
    @keyframes noteOut {
      0%   { opacity:1; scale:1; translate:0 0; }
      100% { opacity:0; scale:.86; translate:0 8px; }
    }
    .note.ein  { animation: noteIn  .32s cubic-bezier(.34,1.56,.64,1) forwards; }
    .note.eout { animation: noteOut .22s ease forwards; pointer-events:none; }

    /* empty state */
    #empty {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      text-align: center; pointer-events: none; z-index: 5;
      opacity: 0; transition: opacity .4s ease;
    }
    #empty.on { opacity: 1; }
    #eascii { color: var(--muted); opacity: .1; font-size: 11px; line-height: 1.4; margin-bottom: 18px; letter-spacing: .05em; }
    #emsg   { color: var(--muted); font-size: 12px; line-height: 2; }
    #emsg span { color: var(--green); }
    #ehint { color: var(--muted); font-size: 10px; margin-top: 8px; opacity: .5; }

    /* toast */
    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--bg3); border: 1px solid var(--green-border);
      color: var(--text); font-size: 11px; padding: 8px 18px; border-radius: 2px;
      z-index: 8000; opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s;
      box-shadow: 0 4px 20px rgba(0,0,0,.6); white-space: nowrap;
      letter-spacing: .04em;
    }
    #toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.ok  { border-color: var(--green); color: var(--green); }
    #toast.bad { border-color: var(--error); color: var(--error); }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- BOOT -->
<div id="boot">
  <div id="boot-log"></div>
  <div id="boot-bar-wrap"><div id="boot-bar"></div></div>
</div>

<!-- HEADER -->
<div id="header">
  <div id="header-left">
    <div class="sdot"></div>
    <div id="logo">terminal://board</div>
    <div id="bc">/ workspace</div>
  </div>
  <div id="header-right">
    <span id="note-count">0 notas</span>
    <span id="clock">--:--:--</span>
    <button class="hbtn sm" id="tbtn" onclick="toggleTP()">◈</button>
    <button class="hbtn danger" id="clr-btn" onclick="confirmClear()">[clr]</button>
    <button class="hbtn" onclick="addNote()">[ + nota ]</button>
  </div>
</div>

<!-- THEME PANEL -->
<div id="tp" class="off">
  <div id="tp-title">// cor do sistema</div>
  <div id="hue-row"></div>
  <input type="range" id="hue-sl" min="0" max="360" value="135" />
  <div id="hue-val">hsl(135, 100%, 50%)</div>
</div>

<!-- BOARD -->
<div id="board"><div id="bi"></div></div>

<!-- EMPTY -->
<div id="empty">
  <pre id="eascii">
┌─────────────────────┐
│  ▭   ▭   ▭   ▭     │
│                     │
│  ▭   ▭   ▭         │
└─────────────────────┘</pre>
  <div id="emsg">nenhuma nota ainda<br>clique em <span>[ + nota ]</span> para começar</div>
  <div id="ehint">atalho: ctrl+enter</div>
</div>

<script type="module">
/* ── CLOCK ── */
setInterval(()=>{
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('pt-BR');
},1000);

/* ── TOAST ── */
let toastT;
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='on'+(type?' '+type:'');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.className='',2400);
}

/* ── THEME ── */
const HP=[{h:0},{h:30},{h:60},{h:90},{h:135},{h:180},{h:210},{h:255},{h:270},{h:300},{h:330}];
function applyH(h){
  document.documentElement.style.setProperty('--h',h);
  document.getElementById('hue-sl').value=h;
  document.getElementById('hue-val').textContent=`hsl(${h}, 100%, 50%)`;
  localStorage.setItem('tb_hue',h);
  document.querySelectorAll('.hdot').forEach(d=>d.classList.toggle('on',+d.dataset.h===+h));
}
const hr=document.getElementById('hue-row');
HP.forEach(p=>{
  const d=document.createElement('div');
  d.className='hdot';d.dataset.h=p.h;
  d.style.background=`hsl(${p.h},100%,50%)`;
  d.addEventListener('click',()=>applyH(p.h));
  hr.appendChild(d);
});
document.getElementById('hue-sl').addEventListener('input',e=>applyH(+e.target.value));
function toggleTP(){document.getElementById('tp').classList.toggle('off');}
document.addEventListener('click',e=>{
  const tp=document.getElementById('tp');
  if(!tp.classList.contains('off')&&!tp.contains(e.target)&&e.target!==document.getElementById('tbtn'))
    tp.classList.add('off');
});
applyH(+(localStorage.getItem('tb_hue')||135));

/* ── BOOT ── */
const BL=[
  {t:'terminal://board  v2.1.0',  c:'bl-title', d:0},
  {t:'────────────────────────────────────',c:'',d:100},
  {t:'> init kernel modules............', c:'',    d:180},
  {t:'  [OK] memory allocator',          c:'bl-ok',d:290},
  {t:'  [OK] filesystem driver',         c:'bl-ok',d:380},
  {t:'  [OK] persistence layer',         c:'bl-ok',d:460},
  {t:'> mounting /board/workspace',      c:'',     d:560},
  {t:'  [OK] board surface ready',       c:'bl-ok',d:650},
  {t:'> loading note engine',            c:'',     d:740},
  {t:'  [OK] drag & resize controller',  c:'bl-ok',d:820},
  {t:'  [OK] checklist module',          c:'bl-ok',d:890},

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, set, remove, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const _app = initializeApp({
  apiKey: "AIzaSyA8DI8tyA_ZblKpj-UmMIq1PVYzkJ2aNzQ",
  authDomain: "o-maquinario-do-fim.firebaseapp.com",
  databaseURL: "https://o-maquinario-do-fim-default-rtdb.firebaseio.com",
  projectId: "o-maquinario-do-fim",
  storageBucket: "o-maquinario-do-fim.firebasestorage.app",
  messagingSenderId: "190938684149",
  appId: "1:190938684149:web:0f988af35ec4a5213f03bc"
});
const _db = getDatabase(_app);
const BOARD_REF = ref(_db, 'board/notes');

/* ── NOTES ── */
let notes=[],zt=20,acp=null;
const NC=[
  {v:'hsl(135,100%,50%)'},{v:'hsl(180,100%,50%)'},{v:'hsl(195,100%,52%)'},
  {v:'hsl(210,100%,58%)'},{v:'hsl(255,100%,68%)'},{v:'hsl(270,100%,65%)'},
  {v:'hsl(300,100%,58%)'},{v:'hsl(330,100%,60%)'},{v:'hsl(0,100%,58%)'},
  {v:'hsl(20,100%,58%)' }
];

function sv(id){
  const n=gn(id);
  if(n) set(ref(_db,`board/notes/${id}`), n);
}

function gn(id){return notes.find(n=>n.id===id);}

function up(id,f){
  const n=gn(id);
  if(n){Object.assign(n,f);sv(id);}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function loadNotes(){
  document.getElementById('note-count').textContent='syncing...';
  onValue(BOARD_REF, snap => {
    const incoming = [];
    if(snap.exists()) snap.forEach(c=>incoming.push(c.val()));

    const incomingIds = new Set(incoming.map(n=>String(n.id)));

    // remove notes deleted on another device
    notes.forEach(n=>{
      if(!incomingIds.has(String(n.id))){
        const el=document.querySelector(`.note[data-id="${n.id}"]`);
        if(el){el.classList.add('eout');el.addEventListener('animationend',()=>el.remove(),{once:true});}
      }
    });

    // add or fully sync each incoming note
    incoming.forEach(n=>{
      const existingData = notes.find(e=>String(e.id)===String(n.id));
      const el = document.querySelector(`.note[data-id="${n.id}"]`);

      if(!existingData || !el){
        // brand new note — render it
        render(n, false);
      } else {
        // existing note — patch DOM with any changed fields
        const focused = document.activeElement;

        // position
        if(existingData.x!==n.x||existingData.y!==n.y){
          el.style.left=n.x+'px'; el.style.top=n.y+'px';
        }
        // size
        if(existingData.w!==n.w) el.style.width=(n.w||228)+'px';
        if(existingData.h!==n.h&&n.h) el.style.minHeight=n.h+'px';
        // color — always apply so picker changes show immediately
        el.style.setProperty('--accent', n.color);
        // tag
        const ti=el.querySelector('.n-tag');
        if(ti && focused!==ti) ti.value=n.tag||'';
        // text
        const ta=el.querySelector('.n-ta');
        if(ta && focused!==ta) ta.value=n.text||'';
        // pin
        const pb=el.querySelector('.pin-btn');
        if(pb){pb.textContent=n.pinned?'📌':'◇';pb.classList.toggle('pinon',!!n.pinned);}
        // mode / checklist — re-run setMode if anything changed
        if(existingData.mode!==n.mode || JSON.stringify(existingData.checklist)!==JSON.stringify(n.checklist)){
          Object.assign(existingData, n);
          setMode(el, n);
        }
        Object.assign(existingData, n);
      }
    });

    notes = incoming;
    ui();
  });
}

function ui(){
  const n=notes.length;
  document.getElementById('note-count').textContent=`${n} nota${n!==1?'s':''}`;
  document.getElementById('empty').classList.toggle('on',n===0);
}

function rpos(){
  const b=document.getElementById('board');
  return{
    x:Math.round(b.clientWidth/2-114+(Math.random()-.5)*280),
    y:Math.round(b.clientHeight/2-90+(Math.random()-.5)*220)
  };
}

function addNote(){
  const id=Date.now(),pos=rpos();
  const h = getComputedStyle(document.documentElement).getPropertyValue('--h').trim();
  const themeColor = `hsl(${h},100%,50%)`;
  const note={id,x:pos.x,y:pos.y,w:228,h:null,
    tag:`nota_${notes.length+1}`,text:'',checklist:[],
    mode:'text',color:themeColor,pinned:false,ts:Date.now()};
  // write to firebase — onValue will pick it up and render
  set(ref(_db,`board/notes/${id}`), note);
  toast('> nota criada','ok');
}

function render(data,anim){
  const el=document.createElement('div');
  el.className='note';
  el.dataset.id=data.id;
  // position via transform for GPU-accelerated smooth drag
  el.style.cssText=`left:${data.x}px;top:${data.y}px;width:${data.w||228}px;z-index:${++zt};--accent:${data.color};will-change:transform;`;
  if(data.h)el.style.minHeight=data.h+'px';
  const ts=new Date(data.ts).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  el.innerHTML=`
    <div class="n-bar"></div>
    <div class="n-hdr" data-drag>
      <div class="n-grip"><span><i></i><i></i><i></i></span><span><i></i><i></i><i></i></span></div>
      <input class="n-tag" value="${esc(data.tag)}" placeholder="tag..." spellcheck="false" autocomplete="off" maxlength="24"/>
      <div class="n-acts">
        <button class="ib pin-btn" title="fixar">${data.pinned?'📌':'◇'}</button>
        <button class="ib col-btn" title="cor">◈</button>
        <button class="ib del del-btn" title="apagar">✕</button>
      </div>
    </div>
    <div class="n-body">
      <textarea class="n-ta" placeholder="escreva aqui..." spellcheck="false">${esc(data.text)}</textarea>
      <div class="n-cl dn"></div>
      <button class="acb dn">+ item</button>
      <button class="rcb dn">- item</button>
    </div>
    <div class="n-ftr">
      <button class="n-tog">[ lista ]</button>
      <div class="n-meta"><span class="n-ts">${ts}</span><span class="n-prog"></span></div>
    </div>
    <div class="n-rsz"></div>`;
  document.getElementById('bi').appendChild(el);
  if(anim){el.classList.add('ein');el.addEventListener('animationend',()=>el.classList.remove('ein'),{once:true});}
  setMode(el,data);
  wire(el,data);
}

function setMode(el,data){
  const ta=el.querySelector('.n-ta');
  const cl=el.querySelector('.n-cl');
  const acb=el.querySelector('.acb');
  const rcb=el.querySelector('.rcb');
  const tog=el.querySelector('.n-tog');
  if(data.mode==='check'){
    ta.classList.add('dn');cl.classList.remove('dn');acb.classList.remove('dn');rcb.classList.remove('dn');
    tog.textContent='[ texto ]';tog.classList.add('on');
    renderCL(el,data);
  }else{
    ta.classList.remove('dn');cl.classList.add('dn');acb.classList.add('dn');rcb.classList.add('dn');
    tog.textContent='[ lista ]';tog.classList.remove('on');
    ta.value=data.text;
  }
  prog(el,data);
}

function prog(el,data){
  const p=el.querySelector('.n-prog');if(!p)return;
  if(data.mode==='check'&&data.checklist.length){
    const d=data.checklist.filter(c=>c.done).length;
    p.textContent=`${d}/${data.checklist.length}`;
  }else p.textContent='';
}

function renderCL(el,data){
  const cl=el.querySelector('.n-cl');cl.innerHTML='';
  (data.checklist||[]).forEach(item=>{
    const row=document.createElement('div');row.className='ci';
    const cb=document.createElement('input');cb.type='checkbox';cb.className='ccb';cb.checked=item.done;
    const lb=document.createElement('span');lb.className='clbl'+(item.done?' dn':'');
    lb.contentEditable='true';lb.spellcheck=false;lb.textContent=item.text;
    cb.addEventListener('change',()=>{
      const d=gn(data.id);const it=d.checklist.find(c=>c.id===item.id);
      if(it){it.done=cb.checked;lb.classList.toggle('dn',cb.checked);}
      up(data.id,{checklist:d.checklist});prog(el,d);
    });
    lb.addEventListener('input',()=>{const d=gn(data.id);const it=d.checklist.find(c=>c.id===item.id);if(it)it.text=lb.textContent;up(data.id,{checklist:d.checklist});});
    lb.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();el.querySelector('.acb').click();}});
    row.append(cb,lb);cl.appendChild(row);
  });
}

function openCpick(el,nid){
  if(acp){acp.remove();acp=null;}
  const pop=document.createElement('div');pop.className='cpick';
  const d=gn(nid);
  NC.forEach(c=>{
    const dot=document.createElement('div');
    dot.className='cdot'+(d.color===c.v?' on':'');
    dot.style.background=c.v;
    dot.addEventListener('click',()=>{
      up(nid,{color:c.v});
      el.style.setProperty('--accent',c.v);
      pop.remove();acp=null;
    });
    pop.appendChild(dot);
  });
  el.querySelector('.n-acts').appendChild(pop);
  acp=pop;
}
document.addEventListener('click',()=>{if(acp){acp.remove();acp=null;}});

function brf(el,id){const d=gn(id);if(d&&d.pinned)return;el.style.zIndex=++zt;}

function wire(el,data){
  el.querySelector('.n-tag').addEventListener('mousedown',e=>e.stopPropagation());
  el.querySelector('.n-tag').addEventListener('input',e=>up(data.id,{tag:e.target.value}));
  el.querySelector('.n-ta').addEventListener('input',e=>up(data.id,{text:e.target.value}));
  el.querySelector('.n-ta').addEventListener('mousedown',e=>e.stopPropagation());
  el.querySelector('.n-tog').addEventListener('click',()=>{
    const d=gn(data.id);const nm=d.mode==='text'?'check':'text';
    if(nm==='check'&&!d.checklist.length){
      const ls=d.text.split('\n').filter(l=>l.trim());
      d.checklist=ls.map((t,i)=>({id:i+1,text:t,done:false}));d.text='';
    }
    up(data.id,{mode:nm,checklist:d.checklist,text:d.text});
    setMode(el,gn(data.id));
    toast(nm==='check'?'> modo lista':'> modo texto');
  });
  el.querySelector('.pin-btn').addEventListener('click',()=>{
    const d=gn(data.id);const p=!d.pinned;up(data.id,{pinned:p});
    el.querySelector('.pin-btn').textContent=p?'📌':'◇';
    el.querySelector('.pin-btn').classList.toggle('pinon',p);
    toast(p?'> nota fixada':'> nota desafixada');
  });
  if(data.pinned)el.querySelector('.pin-btn').classList.add('pinon');
  el.querySelector('.col-btn').addEventListener('click',e=>{e.stopPropagation();openCpick(el,data.id);});
  el.querySelector('.del-btn').addEventListener('click',()=>delNote(data.id,el));
  el.querySelector('.acb').addEventListener('click',()=>{
    const d=gn(data.id);const mx=d.checklist.reduce((m,c)=>Math.max(m,c.id),0);
    d.checklist.push({id:mx+1,text:'',done:false});
    up(data.id,{checklist:d.checklist});
    setMode(el,gn(data.id));
    setTimeout(()=>{const ins=el.querySelectorAll('.clbl');if(ins.length)ins[ins.length-1].focus();},20);
  });
  el.querySelector('.rcb').addEventListener('click',()=>{
    const d=gn(data.id);
    // find last empty item
    const idx=d.checklist.map(c=>c.text.trim()).lastIndexOf('');
    if(idx===-1){toast('> sem itens vazios para remover','bad');return;}
    d.checklist.splice(idx,1);
    up(data.id,{checklist:d.checklist});
    setMode(el,gn(data.id));
  });
  el.addEventListener('mousedown',()=>brf(el,data.id));
  drag(el,data);
  resize(el,data);
}

function clampToBounds(x, y, el) {
  const board = document.getElementById('board');
  return {
    x: Math.max(0, Math.min(x, board.clientWidth  - el.offsetWidth)),
    y: Math.max(0, Math.min(y, board.clientHeight - el.offsetHeight))
  };
}

function drag(el,data){
  el.querySelector('[data-drag]').addEventListener('mousedown',e=>{
    if(e.target.closest('input,button,textarea'))return;
    const d=gn(data.id);if(d&&d.pinned)return;
    e.preventDefault();brf(el,data.id);

    const ox=e.clientX-data.x, oy=e.clientY-data.y;
    el.classList.add('dragging');

    // smooth interpolation state
    let targetX=data.x, targetY=data.y;
    let curX=data.x,    curY=data.y;
    let rafId=null, running=true;

    function tick(){
      if(!running)return;
      const clamped = clampToBounds(targetX, targetY, el);
      curX = curX + (clamped.x - curX) * 0.28;
      curY = curY + (clamped.y - curY) * 0.28;
      if(Math.abs(curX-clamped.x)<0.08) curX=clamped.x;
      if(Math.abs(curY-clamped.y)<0.08) curY=clamped.y;
      data.x=curX; data.y=curY;
      el.style.left=curX+'px';
      el.style.top =curY+'px';
      rafId=requestAnimationFrame(tick);
    }
    rafId=requestAnimationFrame(tick);

    function mv(e){
      targetX=e.clientX-ox;
      targetY=e.clientY-oy;
    }
    function up2(){
      running=false;
      cancelAnimationFrame(rafId);
      el.classList.remove('dragging');
      const clamped=clampToBounds(targetX,targetY,el);
      data.x=clamped.x; data.y=clamped.y;
      el.style.left=clamped.x+'px';
      el.style.top =clamped.y+'px';
      up(data.id,{x:data.x,y:data.y});
      window.removeEventListener('mousemove',mv);
      window.removeEventListener('mouseup',up2);
    }
    window.addEventListener('mousemove',mv);
    window.addEventListener('mouseup',up2);
  });
}

function resize(el,data){
  el.querySelector('.n-rsz').addEventListener('mousedown',e=>{
    e.preventDefault();e.stopPropagation();
    const sx=e.clientX,sy=e.clientY,sw=el.offsetWidth,sh=el.offsetHeight;
    function mv(e){const w=Math.max(190,sw+(e.clientX-sx));const h=Math.max(130,sh+(e.clientY-sy));el.style.width=w+'px';el.style.minHeight=h+'px';data.w=w;data.h=h;}
    function up2(){up(data.id,{w:data.w,h:data.h});window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up2);}
    window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up2);
  });
}

function delNote(id,el){
  const d=gn(id);if(d&&d.pinned){toast('> nota fixada — desafixe primeiro','bad');return;}
  el.classList.add('eout');
  el.addEventListener('animationend',()=>{
    el.remove();
    remove(ref(_db,`board/notes/${id}`));
  },{once:true});
  toast('> nota removida');
}

let _cc=false;
function confirmClear(){
  if(!notes.length)return;
  if(!_cc){
    _cc=true;
    const b=document.getElementById('clr-btn');
    b.textContent='[clr?]';b.style.color='var(--error)';b.style.borderColor='var(--error)';
    setTimeout(()=>{_cc=false;b.textContent='[clr]';b.style.color='';b.style.borderColor='';},3000);
    toast('> clique novamente para confirmar','bad');return;
  }
  document.querySelectorAll('.note').forEach(el=>{el.classList.add('eout');el.addEventListener('animationend',()=>el.remove(),{once:true});});
  remove(BOARD_REF);
  _cc=false;
  document.getElementById('clr-btn').textContent='[clr]';
  document.getElementById('clr-btn').style.color='';
  document.getElementById('clr-btn').style.borderColor='';
  toast('> workspace limpo');
}

document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter')addNote();
});

// expose for onclick attributes
window.toggleTP     = toggleTP;
window.confirmClear = confirmClear;
window.addNote      = addNote;
</script>
